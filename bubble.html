<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>氣泡排序動態展示 (Bubble Sort)</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        #array-wrapper {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 250px;
            margin-bottom: 20px;
            padding: 10px;
            border-bottom: 2px solid #ddd;
        }
        .bar {
            width: 30px;
            margin: 0 3px;
            background-color: #3498db; /* Blue */
            transition: height 0.3s ease;
            position: relative;
        }
        .bar::after {
            content: attr(data-value);
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #333;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .btn-group {
            grid-column: span 2;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        label { font-size: 14px; color: #666; }
        input { padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.2s;
        }
        button:hover { background-color: #34495e; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .explanation {
            text-align: left;
            margin-bottom: 30px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #3498db;
        }
        .explanation h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        .explanation h4 {
            color: #34495e;
            margin: 15px 0 8px 0;
            font-size: 1.1em;
        }
        .explanation p {
            line-height: 1.6;
            color: #555;
            margin-bottom: 15px;
        }
        .explanation ol, .explanation ul {
            margin-left: 20px;
            line-height: 1.6;
        }
        .explanation li {
            margin-bottom: 5px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>氣泡排序 (Bubble Sort)</h2>
    
    <div class="explanation">
        <h3>原理說明</h3>
        <p>氣泡排序是一種簡單的排序算法。它重複地走訪要排序的數列，一次比較兩個元素，如果它們的順序錯誤就把它們交換過來。走訪數列的工作是重複地進行直到沒有再需要交換，也就是說該數列已經排序完成。</p>
        
        <h4>演算法步驟：</h4>
        <ol>
            <li>比較相鄰的元素。如果第一個比第二個大，就交換它們兩個。</li>
            <li>對每一對相鄰元素做同樣的工作，從開始第一對到結尾的最後一對。</li>
            <li>重複以上的步驟，直到排序完成。</li>
        </ol>
        
        <h4>時間複雜度：</h4>
        <ul>
            <li>最佳情況：O(n)</li>
            <li>平均情況：O(n²)</li>
            <li>最壞情況：O(n²)</li>
        </ul>
        
        <h4>空間複雜度：O(1)</h4>
    </div>
    
    <div id="array-wrapper"></div>

    <div class="controls">
        <div>
            <label for="dataCount">數據筆數:</label>
            <input type="number" id="dataCount" value="10" min="1" max="25">
        </div>
        <div>
            <label for="speed">動畫延遲 (ms):</label>
            <input type="number" id="speed" value="300" min="50" max="2000">
        </div>
        <div class="btn-group">
            <button onclick="generateArray()">生成隨機數據</button>
            <button id="sortBtn" onclick="runBubbleSort()">開始排序</button>
            <button id="pauseBtn" onclick="togglePause()" disabled>暫停</button>
        </div>
    </div>
</div>

<script>
    let currentArray = [5, 3, 8, 4, 2, 7, 1];
    const wrapper = document.getElementById('array-wrapper');
    const sortBtn = document.getElementById('sortBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    let isPaused = false;

    // 渲染畫布
    function displayArray(arr, activeIdx = -1) {
        wrapper.innerHTML = '';
        arr.forEach((value, index) => {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = `${value * 10}px`; // 放大高度比例
            bar.setAttribute('data-value', value);
            if (index === activeIdx) {
                bar.style.backgroundColor = '#e74c3c'; // 正在處理的顏色
            }
            wrapper.appendChild(bar);
        });
    }

    // 生成隨機陣列
    function generateArray() {
        const count = parseInt(document.getElementById('dataCount').value);
        currentArray = Array.from({ length: count }, () => Math.floor(Math.random() * 20) + 1);
        displayArray(currentArray);
        sortBtn.disabled = false;
    }

    // 暫停/播放切換
    function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '播放' : '暫停';
    }

    // 等待恢復或延遲
    async function waitForResume(delay) {
        while (isPaused) {
            await new Promise(r => setTimeout(r, 100));
        }
        await new Promise(r => setTimeout(r, delay));
    }

    // 核心演算法邏輯
    async function runBubbleSort() {
        sortBtn.disabled = true;
        pauseBtn.disabled = false;
        pauseBtn.textContent = '暫停';
        isPaused = false;
        const speed = parseInt(document.getElementById('speed').value);
        let n = currentArray.length;

        for (let i = 0; i < n; i++) {
            for (let j = 0; j < n - i - 1; j++) {
                displayArray(currentArray, j);
                await waitForResume(speed);
                
                if (currentArray[j] > currentArray[j + 1]) {
                    [currentArray[j], currentArray[j + 1]] = [currentArray[j + 1], currentArray[j]];
                    displayArray(currentArray, j + 1);
                    await waitForResume(speed);
                }
            }
        }
        
        // 完成排序
        displayArray(currentArray);
        alert("排序完成！");
        pauseBtn.disabled = true;
    }

    // 初始載入
    displayArray(currentArray);
</script>

</body>
</html>
