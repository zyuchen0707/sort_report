<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排序演算法動態展示</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            text-align: center;
            max-width: 800px;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        p {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        .algorithms {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .algorithm-card {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            transition: transform 0.3s, background 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .algorithm-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.3);
        }
        .algorithm-card h3 {
            margin-bottom: 10px;
            font-size: 1.5em;
        }
        .algorithm-card p {
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>排序演算法動態展示</h1>
        <p>選擇一個排序演算法來查看其動態演示。每個頁面都支持暫停和重新播放功能。</p>
        
        <div class="algorithms">
            <a href="bubble.html" class="algorithm-card">
                <h3>氣泡排序</h3>
                <p>Bubble Sort</p>
            </a>
            <a href="insertion.html" class="algorithm-card">
                <h3>插入排序</h3>
                <p>Insertion Sort</p>
            </a>
            <a href="selection.html" class="algorithm-card">
                <h3>選擇排序</h3>
                <p>Selection Sort</p>
            </a>
            <a href="merge.html" class="algorithm-card">
                <h3>合併排序</h3>
                <p>Merge Sort</p>
            </a>
            <a href="quick.html" class="algorithm-card">
                <h3>快速排序</h3>
                <p>Quick Sort</p>
            </a>
        </div>
    </div>
</body>
</html>
