<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合併排序動態展示 (Merge Sort)</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        #array-wrapper {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 250px;
            margin-bottom: 20px;
            padding: 10px;
            border-bottom: 2px solid #ddd;
        }
        .bar {
            width: 30px;
            margin: 0 3px;
            background-color: #9b59b6; /* Purple */
            transition: height 0.3s ease;
            position: relative;
        }
        .bar::after {
            content: attr(data-value);
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #333;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .btn-group {
            grid-column: span 2;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        label { font-size: 14px; color: #666; }
        input { padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.2s;
        }
        button:hover { background-color: #34495e; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .explanation {
            text-align: left;
            margin-bottom: 30px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #27ae60;
        }
        .explanation h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        .explanation h4 {
            color: #34495e;
            margin: 15px 0 8px 0;
            font-size: 1.1em;
        }
        .explanation p {
            line-height: 1.6;
            color: #555;
            margin-bottom: 15px;
        }
        .explanation ol, .explanation ul {
            margin-left: 20px;
            line-height: 1.6;
        }
        .explanation li {
            margin-bottom: 5px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>合併排序 (Merge Sort)</h2>
    
    <div class="explanation">
        <h3>原理說明</h3>
        <p>合併排序是一種分治算法。其思想是將待排序的數列分成若干個子序列，每個子序列都是有序的。然後再把有序子序列合併成整體有序序列。合併排序是穩定排序，它也是一种典型的分而治之的算法應用。</p>
        
        <h4>演算法步驟：</h4>
        <ol>
            <li>將數列分成兩半。</li>
            <li>遞歸地對左半部分進行合併排序。</li>
            <li>遞歸地對右半部分進行合併排序。</li>
            <li>將兩個已排序的子數列合併成一個有序的數列。</li>
        </ol>
        
        <h4>時間複雜度：</h4>
        <ul>
            <li>最佳情況：O(n log n)</li>
            <li>平均情況：O(n log n)</li>
            <li>最壞情況：O(n log n)</li>
        </ul>
        
        <h4>空間複雜度：O(n)</h4>
    </div>
    
    <div id="array-wrapper"></div>

    <div class="controls">
        <div>
            <label for="dataCount">數據筆數:</label>
            <input type="number" id="dataCount" value="10" min="1" max="25">
        </div>
        <div>
            <label for="speed">動畫延遲 (ms):</label>
            <input type="number" id="speed" value="300" min="50" max="2000">
        </div>
        <div class="btn-group">
            <button onclick="generateArray()">生成隨機數據</button>
            <button id="sortBtn" onclick="runMergeSort()">開始排序</button>
            <button id="pauseBtn" onclick="togglePause()" disabled>暫停</button>
        </div>
    </div>
</div>

<script>
    let currentArray = [5, 3, 8, 4, 2, 7, 1];
    const wrapper = document.getElementById('array-wrapper');
    const sortBtn = document.getElementById('sortBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    let isPaused = false;

    // 渲染畫布
    function displayArray(arr, activeIdx = -1) {
        wrapper.innerHTML = '';
        arr.forEach((value, index) => {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = `${value * 10}px`; // 放大高度比例
            bar.setAttribute('data-value', value);
            if (index === activeIdx) {
                bar.style.backgroundColor = '#e74c3c'; // 正在處理的顏色
            }
            wrapper.appendChild(bar);
        });
    }

    // 生成隨機陣列
    function generateArray() {
        const count = parseInt(document.getElementById('dataCount').value);
        currentArray = Array.from({ length: count }, () => Math.floor(Math.random() * 20) + 1);
        displayArray(currentArray);
        sortBtn.disabled = false;
    }

    // 暫停/播放切換
    function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '播放' : '暫停';
    }

    // 等待恢復或延遲
    async function waitForResume(delay) {
        while (isPaused) {
            await new Promise(r => setTimeout(r, 100));
        }
        await new Promise(r => setTimeout(r, delay));
    }

    // 核心演算法邏輯
    async function runMergeSort() {
        sortBtn.disabled = true;
        pauseBtn.disabled = false;
        pauseBtn.textContent = '暫停';
        isPaused = false;
        const speed = parseInt(document.getElementById('speed').value);
        
        async function mergeSort(start = 0, end = currentArray.length - 1) {
            if (start >= end) return;
            const mid = Math.floor((start + end) / 2);
            await mergeSort(start, mid);
            await mergeSort(mid + 1, end);
            
            let left = currentArray.slice(start, mid + 1);
            let right = currentArray.slice(mid + 1, end + 1);
            let i = 0, j = 0, k = start;
            
            while (i < left.length && j < right.length) {
                displayArray(currentArray, k);
                await waitForResume(speed);
                if (left[i] <= right[j]) currentArray[k++] = left[i++];
                else currentArray[k++] = right[j++];
            }
            while (i < left.length) currentArray[k++] = left[i++];
            while (j < right.length) currentArray[k++] = right[j++];
        }
        
        await mergeSort();
        
        // 完成排序
        displayArray(currentArray);
        alert("排序完成！");
        pauseBtn.disabled = true;
    }

    // 初始載入
    displayArray(currentArray);
</script>

</body>
</html>
